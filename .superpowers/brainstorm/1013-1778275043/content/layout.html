<h2>选择前端布局方案</h2>
<p class="subtitle">代理控制台包含：代理启停、路由配置、日志查看 三个核心功能区</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>侧边栏导航</h3>
      <p>左侧固定侧边栏，三个Tab切换页面（代理 / 路由 / 日志），各页面独立可全宽展示内容</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>上下分割</h3>
      <p>顶部固定控制栏（启动/停止 + 端口），下方左右分栏：左边路由配置，右边日志列表</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>Tab标签 + 单页全宽</h3>
      <p>顶部Tab切换，每个Tab占据全部内容区域。比侧边栏更省空间，适合窄窗口</p>
    </div>
  </div>
</div>
